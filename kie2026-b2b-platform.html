<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KIE 2026 | B2B 매칭 플랫폼</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
/* ── 토큰 ── */
:root {
  --indigo:    #4A5CF0;
  --indigo-dk: #3547D4;
  --purple:    #6B3FE0;
  --gold:      #C9960A;
  --gold-bg:   #FFF8E1;
  --emerald:   #10B981;
  --em-bg:     #ECFDF5;
  --accent:    #F25C54;
  --ac-bg:     #FEF2F1;
  --sky:       #0EA5E9;
  --sky-bg:    #F0F9FF;
  --bg:        #EEF0F8;
  --card:      #F7F8FC;
  --surface:   #FFFFFF;
  --border:    rgba(0,0,0,0.07);
  --t1:        #0E1020;
  --t2:        #4A5068;
  --t3:        #8E95B0;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--t1);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  padding-bottom: 72px;
}

/* ── 상단 내비게이션 ── */
.app-header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.app-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 18px; font-weight: 800; color: var(--t1); text-decoration: none;
}
.app-logo-badge {
  background: linear-gradient(135deg,var(--indigo),var(--purple));
  color:#fff; font-size:10px; font-weight:700;
  padding: 3px 9px; border-radius: 50px; letter-spacing:1px;
}
.app-header-right { display: flex; align-items: center; gap: 10px; }
.btn-register {
  display: inline-flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg,var(--indigo),var(--purple));
  color:#fff; font-size:13px; font-weight:700;
  padding: 8px 18px; border-radius: 50px;
  border: none; cursor: pointer; transition: opacity .15s;
}
.btn-register:hover { opacity:.88; }
.profile-chip {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 50px;
  font-size: 13px; font-weight: 700; color: var(--t2);
  cursor: pointer;
}
.profile-chip .avatar {
  width:26px; height:26px; border-radius:50%;
  background: linear-gradient(135deg,var(--indigo),var(--purple));
  display:flex; align-items:center; justify-content:center;
  font-size:13px; color:#fff; font-weight:800;
}
.booking-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color:#fff;
  font-size:11px; font-weight:800;
  width:18px; height:18px; border-radius:50%; margin-left:-2px;
}

/* ── 하단 탭 바 ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  display: flex;
  height: 64px;
}
.bnav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  cursor: pointer; border: none; background: none;
  color: var(--t3); font-size: 10px; font-weight: 600;
  letter-spacing: 0.2px; position: relative;
  transition: color .15s;
}
.bnav-item.active { color: var(--indigo); }
.bnav-icon { font-size: 22px; line-height: 1; }
.bnav-cnt {
  position: absolute; top: 8px; right: calc(50% - 16px);
  background: var(--accent); color:#fff;
  font-size:10px; font-weight:800;
  min-width:16px; height:16px;
  border-radius:50px; padding:0 4px;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .15s;
}
.bnav-cnt.show { opacity:1; }

/* ── 뷰 공통 ── */
.view { display:none; max-width:900px; margin:0 auto; padding:20px 16px; }
.view.active { display:block; }

/* ── 홈 뷰 ── */
.home-hero {
  background: linear-gradient(135deg,#080A1C 0%,#1a1060 100%);
  border-radius: 20px; padding: 40px 28px; color: #fff;
  position: relative; overflow: hidden; margin-bottom: 20px;
}
.home-hero::before {
  content:''; position:absolute; top:-40px; right:-40px;
  width:200px; height:200px; border-radius:50%;
  background: rgba(74,92,240,0.15);
}
.home-hero-badge {
  display:inline-flex; align-items:center; gap:7px;
  background: rgba(74,92,240,0.8); color:#fff;
  font-size:12px; font-weight:700; padding:6px 16px;
  border-radius:50px; letter-spacing:1.2px; margin-bottom:18px;
  border:1px solid rgba(255,255,255,0.2);
}
.home-hero-badge::before {
  content:''; width:7px; height:7px; border-radius:50%;
  background:#5FE08A; box-shadow:0 0 0 3px rgba(95,224,138,.3);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{box-shadow:0 0 0 3px rgba(95,224,138,.3);}
  50%{box-shadow:0 0 0 6px rgba(95,224,138,.1);}
}
.home-hero-title {
  font-size:30px; font-weight:800; line-height:1.3;
  letter-spacing:-1px; margin-bottom:10px;
}
.home-hero-title em {
  font-style:normal;
  background:linear-gradient(90deg,#7B8FF8,#A78BFA);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.home-hero-sub {
  font-size:15px; color:rgba(255,255,255,.75);
  line-height:1.7; margin-bottom:24px; word-break:keep-all;
}
.home-hero-info {
  display:flex; gap:16px; flex-wrap:wrap;
}
.home-info-item {
  background:rgba(255,255,255,.1); border-radius:10px;
  padding:10px 16px; display:flex; flex-direction:column; gap:2px;
}
.home-info-v { font-size:16px; font-weight:800; }
.home-info-l { font-size:11px; color:rgba(255,255,255,.6); font-weight:600; }

.stat-row {
  display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
  margin-bottom:20px;
}
.stat-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:20px 16px; text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.04);
}
.stat-num { font-size:28px; font-weight:800; color:var(--indigo); }
.stat-lbl { font-size:12px; color:var(--t3); font-weight:600; margin-top:4px; }

.quick-actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.qa-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:20px 18px;
  display:flex; align-items:center; gap:14px;
  cursor:pointer; transition:transform .15s, box-shadow .15s;
  box-shadow:0 2px 10px rgba(0,0,0,.04);
}
.qa-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.09); }
.qa-icon { font-size:32px; flex-shrink:0; }
.qa-title { font-size:15px; font-weight:800; color:var(--t1); }
.qa-sub { font-size:13px; color:var(--t3); margin-top:3px; }

.timeline-info {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.04);
}
.timeline-info-title {
  font-size:14px; font-weight:800; color:var(--t1);
  margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.timeline-info-title::before {
  content:''; width:4px; height:16px;
  background:linear-gradient(180deg,var(--indigo),var(--purple));
  border-radius:2px;
}
.slot-list { display:flex; flex-direction:column; gap:6px; }
.slot-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px; border-radius:8px;
  font-size:13px;
}
.slot-row.morning { background:rgba(74,92,240,.06); }
.slot-row.afternoon { background:rgba(16,185,129,.06); }
.slot-row.lunch { background:rgba(201,150,10,.08); }
.slot-time { font-weight:700; color:var(--t1); }
.slot-type { font-size:12px; color:var(--t3); }
.slot-dur { font-size:12px; font-weight:600; }
.slot-row.morning .slot-dur { color:var(--indigo); }
.slot-row.afternoon .slot-dur { color:var(--emerald); }
.slot-row.lunch .slot-dur { color:var(--gold); }

/* ── 공급업체 목록 ── */
.filter-bar {
  display:flex; gap:8px; overflow-x:auto; padding-bottom:4px;
  margin-bottom:16px; scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar { display:none; }
.filter-btn {
  flex-shrink:0; padding:8px 16px; border-radius:50px;
  border:1.5px solid var(--border); background:var(--surface);
  font-size:13px; font-weight:600; color:var(--t2);
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.filter-btn.active {
  background:rgba(74,92,240,.08); border-color:rgba(74,92,240,.3);
  color:var(--indigo);
}

.supplier-grid {
  display:grid; grid-template-columns:repeat(2,1fr); gap:12px;
}
.s-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:18px 16px;
  cursor:pointer; transition:transform .15s, box-shadow .15s;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
  position:relative;
}
.s-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.09); }
.s-card-top {
  display:flex; align-items:flex-start; justify-content:space-between;
  margin-bottom:10px;
}
.s-flag { font-size:28px; }
.s-cat-badge {
  font-size:11px; font-weight:700; padding:3px 9px; border-radius:50px;
}
.s-company { font-size:15px; font-weight:800; color:var(--t1); margin-bottom:4px; line-height:1.3; }
.s-country { font-size:12px; color:var(--t3); font-weight:600; margin-bottom:8px; }
.s-tagline { font-size:12px; color:var(--t2); line-height:1.5; word-break:keep-all; }
.s-booth {
  display:inline-block; margin-top:10px;
  font-size:11px; font-weight:700; color:var(--t3);
  background:var(--card); padding:3px 8px; border-radius:6px;
}
.s-avail-bar {
  margin-top:12px; height:3px; border-radius:2px;
  background:var(--border); overflow:hidden;
}
.s-avail-fill { height:100%; border-radius:2px; background:var(--emerald); }

.cat-food    { background:rgba(16,185,129,.1);  color:#059669; }
.cat-beauty  { background:rgba(236,72,153,.1);  color:#DB2777; }
.cat-health  { background:rgba(14,165,233,.1);  color:#0284C7; }
.cat-living  { background:rgba(245,158,11,.1);  color:#D97706; }
.cat-drinks  { background:rgba(107,63,224,.1);  color:#7C3AED; }

/* ── 공급업체 상세 모달 ── */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,.45); align-items:flex-end; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal-sheet {
  background:var(--surface); border-radius:24px 24px 0 0;
  width:100%; max-width:900px; max-height:92vh;
  overflow-y:auto; padding-bottom:env(safe-area-inset-bottom);
  animation: slideUp .25s ease;
}
@keyframes slideUp { from{transform:translateY(60px);opacity:0;} to{transform:translateY(0);opacity:1;} }
.modal-handle {
  width:40px; height:4px; border-radius:2px;
  background:var(--border); margin:14px auto 0;
}
.modal-header {
  padding:16px 20px 12px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.modal-title { font-size:18px; font-weight:800; color:var(--t1); }
.modal-close {
  width:36px; height:36px; border-radius:50%;
  background:var(--card); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; color:var(--t2); transition:background .15s;
}
.modal-close:hover { background:var(--border); }
.modal-body { padding:20px; }

.s-detail-top {
  display:flex; align-items:center; gap:16px; margin-bottom:20px;
}
.s-detail-flag { font-size:48px; }
.s-detail-info {}
.s-detail-company { font-size:20px; font-weight:800; color:var(--t1); }
.s-detail-country { font-size:14px; color:var(--t3); font-weight:600; margin-top:2px; }
.s-detail-booth-badge {
  display:inline-block; margin-top:6px;
  font-size:12px; font-weight:700;
  background:rgba(74,92,240,.08); color:var(--indigo);
  padding:4px 10px; border-radius:50px;
}

.s-detail-desc { font-size:14px; color:var(--t2); line-height:1.75; margin-bottom:20px; word-break:keep-all; }

.detail-section-title {
  font-size:13px; font-weight:800; color:var(--t3);
  text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;
}
.product-list {
  display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;
}
.product-tag {
  background:var(--card); border:1px solid var(--border);
  border-radius:8px; padding:6px 12px;
  font-size:13px; font-weight:600; color:var(--t2);
}

/* 예약 슬롯 그리드 */
.booking-days { display:flex; gap:8px; margin-bottom:12px; }
.booking-day-tab {
  flex:1; padding:10px 6px; text-align:center;
  border:1.5px solid var(--border); border-radius:10px;
  background:var(--card); cursor:pointer;
  font-size:14px; font-weight:700; color:var(--t2);
  transition:all .15s;
}
.booking-day-tab.active {
  border-color:var(--indigo); background:rgba(74,92,240,.06); color:var(--indigo);
}
.booking-slot-panel { display:none; }
.booking-slot-panel.active { display:block; }

.slot-legend {
  display:flex; gap:14px; margin-bottom:10px; flex-wrap:wrap;
}
.sl { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--t3); }
.sl-dot {
  width:12px; height:12px; border-radius:3px;
}
.sl-dot.avail  { background:var(--surface); border:1.5px solid var(--border); }
.sl-dot.mine   { background:var(--indigo); }
.sl-dot.others { background:#F1F2F6; border:1.5px solid #E0E2EE; }
.sl-dot.conflict { background:rgba(242,92,84,.12); border:1.5px solid rgba(242,92,84,.3); }

.slots-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:7px;
  margin-bottom:6px;
}
.b-slot {
  padding:12px 6px; border-radius:9px;
  border:1.5px solid var(--border); background:var(--surface);
  text-align:center; cursor:pointer;
  transition:all .15s; user-select:none;
}
.b-slot:hover:not(.full):not(.conflict-slot) {
  border-color:var(--indigo); transform:translateY(-1px);
}
.b-slot.mine-slot {
  background:var(--indigo); border-color:var(--indigo); color:#fff;
}
.b-slot.full {
  background:#F1F2F6; border-color:#E0E2EE; cursor:not-allowed; opacity:.6;
}
.b-slot.conflict-slot {
  background:rgba(242,92,84,.06); border-color:rgba(242,92,84,.2); cursor:not-allowed;
}
.b-slot-time { font-size:12px; font-weight:700; color:var(--t1); }
.b-slot.mine-slot .b-slot-time { color:#fff; }
.b-slot.full .b-slot-time { color:var(--t3); }
.b-slot-status { font-size:11px; color:var(--t3); margin-top:3px; }
.b-slot.mine-slot .b-slot-status { color:rgba(255,255,255,.8); }

.lunch-divider {
  text-align:center; padding:8px;
  font-size:12px; font-weight:700; color:var(--gold);
  background:var(--gold-bg); border-radius:8px; margin-bottom:7px;
}

/* ── 타임테이블 ── */
.tt-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px;
}
.tt-title { font-size:20px; font-weight:800; }
.tt-legend { display:flex; gap:10px; }
.tt-leg { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--t3); }
.tt-leg-dot { width:10px; height:10px; border-radius:3px; }

.tt-table-wrap { overflow-x:auto; }
.tt-table {
  width:100%; border-collapse:separate; border-spacing:0;
  background:var(--surface); border-radius:16px; overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.05);
  min-width:460px;
}
.tt-table th {
  background: linear-gradient(135deg,var(--indigo),var(--purple));
  color:#fff; font-size:13px; font-weight:700;
  padding:14px 8px; text-align:center;
}
.tt-table th:first-child { text-align:left; padding-left:16px; width:110px; }
.tt-table td {
  padding:8px; vertical-align:middle; border-bottom:1px solid var(--border);
  font-size:12px;
}
.tt-table tr:last-child td { border-bottom:none; }
.tt-time-cell {
  font-size:12px; font-weight:700; color:var(--t2); padding-left:12px;
  white-space:nowrap;
}
.tt-slot-cell { text-align:center; }
.tt-empty { color:var(--t3); font-size:11px; }
.tt-booked {
  background:linear-gradient(135deg,rgba(74,92,240,.1),rgba(107,63,224,.1));
  border:1px solid rgba(74,92,240,.2); border-radius:8px;
  padding:6px 8px; cursor:pointer; transition:transform .1s;
}
.tt-booked:hover { transform:scale(1.02); }
.tt-booked-company { font-size:11px; font-weight:800; color:var(--indigo); }
.tt-booked-cat { font-size:10px; color:var(--t3); margin-top:1px; }
.tt-lunch {
  background:var(--gold-bg); color:var(--gold);
  font-size:12px; font-weight:700; text-align:center;
  padding:10px; border-bottom:1px solid var(--border);
}
.tt-lunch td { text-align:center; color:var(--gold); font-weight:700; border-bottom:none; }

.tt-empty-state {
  text-align:center; padding:48px 20px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.tt-empty-icon { font-size:48px; }
.tt-empty-title { font-size:17px; font-weight:700; color:var(--t2); }
.tt-empty-sub { font-size:14px; color:var(--t3); }

/* ── 내 정보 ── */
.profile-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:24px; margin-bottom:16px;
  box-shadow:0 2px 10px rgba(0,0,0,.04);
}
.profile-top { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
.profile-avatar {
  width:56px; height:56px; border-radius:50%;
  background:linear-gradient(135deg,var(--indigo),var(--purple));
  display:flex; align-items:center; justify-content:center;
  font-size:22px; font-weight:800; color:#fff; flex-shrink:0;
}
.profile-name { font-size:18px; font-weight:800; color:var(--t1); }
.profile-company { font-size:14px; color:var(--t3); font-weight:600; margin-top:2px; }
.profile-meta { display:flex; flex-direction:column; gap:10px; }
.pm-row { display:flex; align-items:center; gap:10px; font-size:14px; }
.pm-label { color:var(--t3); font-weight:600; width:70px; flex-shrink:0; }
.pm-value { color:var(--t1); font-weight:600; }

.booking-summary {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;
}
.bs-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:16px 12px; text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.03);
}
.bs-num { font-size:24px; font-weight:800; color:var(--indigo); }
.bs-lbl { font-size:11px; color:var(--t3); font-weight:600; margin-top:3px; }

.booking-list { display:flex; flex-direction:column; gap:10px; }
.bk-item {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:14px 16px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  box-shadow:0 1px 6px rgba(0,0,0,.03);
}
.bk-left { display:flex; align-items:center; gap:12px; }
.bk-flag { font-size:24px; }
.bk-company { font-size:14px; font-weight:800; color:var(--t1); }
.bk-time { font-size:12px; color:var(--t3); font-weight:600; margin-top:2px; }
.bk-cancel {
  flex-shrink:0; border:1px solid rgba(242,92,84,.3);
  background:transparent; color:var(--accent);
  font-size:12px; font-weight:700; padding:6px 12px; border-radius:8px;
  cursor:pointer; transition:all .15s;
}
.bk-cancel:hover { background:var(--ac-bg); }

/* ── 바이어 등록 모달 ── */

    desc:'보르도 지롱드 와인 에이전시. AOC 인증 레드·화이트·로제 와인과 샴페인을 레스토랑·와인바에 공급합니다.',
    products:['Bordeaux Rouge 2021','Sauternes 375ml','Rosé Provence','샴페인 브뤼'],
    contact:'korea@bordeaux-select.fr' },
];

/* 랜덤 선점 슬롯 생성 (타사 예약) */
function genOccupied(supplierId) {
  const occ = {};
  const seed = supplierId * 137;
  DAYS.forEach((d, di) => {
    SLOTS.forEach((s, si) => {
      const hash = ((seed + di * 31 + si * 17) % 100);
      if (hash < 38) occ[d.key + '_' + s.id] = 'others';
    });
  });
  return occ;
}
const OCCUPIED = {};
SUPPLIERS.forEach(s => { OCCUPIED[s.id] = genOccupied(s.id); });

/* ──────────────────────────────────────
   STATE
────────────────────────────────────── */
let state = {
  buyer: null,
  bookings: [],     // { supplierId, dayKey, slotId }
  view: 'home',
  filterCat: 'all',
  openDetailId: null,
  openDetailDay: 0,
};

/* ──────────────────────────────────────
   NAVIGATION
────────────────────────────────────── */
function navigate(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.bnav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  document.getElementById('view-' + view).classList.add('active');
  state.view = view;
  if (view === 'timetable') renderTimetable();
  if (view === 'profile')   renderProfile();
  if (view === 'suppliers') renderSuppliers();
  window.scrollTo(0, 0);
}

/* ──────────────────────────────────────
   MODAL
────────────────────────────────────── */
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) closeModal(el.id);
  });
});

/* ──────────────────────────────────────
   TOAST
────────────────────────────────────── */
function toast(msg, type = 'info') {
  const tc = document.getElementById('toast-container');
  const t  = document.createElement('div');
  t.className = 'toast ' + type;
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  t.innerHTML = `<span>${icons[type]||''}</span><span>${msg}</span>`;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

/* ──────────────────────────────────────
   HOME — 슬롯 리스트
────────────────────────────────────── */
function renderHomeSlots() {
  const el = document.getElementById('home-slot-list');
  const morning = SLOTS.filter(s => s.label === '오전');
  const afternoon = SLOTS.filter(s => s.label === '오후');
  let html = '';
  morning.forEach(s => {
    html += `<div class="slot-row morning">
      <span class="slot-time">${s.time}</span>
      <span class="slot-type">오전 상담</span>
      <span class="slot-dur">25분 상담 + 5분 휴식</span>
    </div>`;
  });
  html += `<div class="slot-row lunch">
    <span class="slot-time">12:30~13:30</span>
    <span class="slot-type" style="color:var(--gold)">점심시간</span>
    <span class="slot-dur" style="color:var(--gold)">60분</span>
  </div>`;
  afternoon.forEach(s => {
    html += `<div class="slot-row afternoon">
      <span class="slot-time">${s.time}</span>
      <span class="slot-type">오후 상담</span>
      <span class="slot-dur">25분 상담 + 5분 휴식</span>
    </div>`;
  });
  el.innerHTML = html;
}

/* ──────────────────────────────────────
   SUPPLIER LIST
────────────────────────────────────── */
function renderFilterBar() {
  const bar = document.getElementById('filter-bar');
  const cats = ['all', ...CATEGORIES];
  bar.innerHTML = cats.map(c => {
    const active = state.filterCat === c ? ' active' : '';
    const label  = c === 'all' ? '🌐 전체' : (CAT_ICON[c]||'') + ' ' + c;
    return `<button class="filter-btn${active}" onclick="setFilter('${c}')">${label}</button>`;
  }).join('');
}

function setFilter(cat) {
  state.filterCat = cat;
  renderFilterBar();
  renderSuppliers();
}

function renderSuppliers() {
  renderFilterBar();
  const filtered = state.filterCat === 'all'
    ? SUPPLIERS
    : SUPPLIERS.filter(s => s.category === state.filterCat);
  const grid = document.getElementById('supplier-grid');
  const countTxt = document.getElementById('supplier-count-txt');
  countTxt.textContent = `${filtered.length}개 업체`;
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">해당 카테고리 업체가 없습니다</div>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map(s => {
    const totalSlots = DAYS.length * SLOTS.length;
    const occupied   = Object.values(OCCUPIED[s.id]).filter(v => v === 'others').length;
    const myBooked   = state.bookings.filter(b => b.supplierId === s.id).length;
    const availCount = totalSlots - occupied - myBooked;
    const availPct   = Math.round((availCount / totalSlots) * 100);
    return `
    <div class="s-card" onclick="openSupplier(${s.id})">
      <div class="s-card-top">
        <span class="s-flag">${s.flag}</span>
        <span class="s-cat-badge ${CAT_CLASS[s.category]||''}">${s.category}</span>
      </div>
      <div class="s-company">${s.company}</div>
      <div class="s-country">${s.country} · ${s.booth}</div>
      <div class="s-tagline">${s.tagline}</div>
      <div class="s-avail-bar">
        <div class="s-avail-fill" style="width:${availPct}%"></div>
      </div>
      <div style="font-size:11px;color:var(--t3);margin-top:5px;">잔여 ${availCount}슬롯</div>
    </div>`;
  }).join('');
}

/* ──────────────────────────────────────
   SUPPLIER DETAIL MODAL
────────────────────────────────────── */
function openSupplier(id) {
  const s = SUPPLIERS.find(x => x.id === id);
  if (!s) return;
  state.openDetailId = id;
  state.openDetailDay = 0;
  document.getElementById('sm-title').textContent = s.company;
  renderSupplierModal(s);
  openModal('supplier-modal');
}

function renderSupplierModal(s) {
  const body = document.getElementById('sm-body');
  const dayTabs = DAYS.map((d, i) => `
    <div class="booking-day-tab ${i === state.openDetailDay ? 'active' : ''}"
         onclick="switchDetailDay(${i})">${d.label}</div>`).join('');

  const panels = DAYS.map((d, di) => `
    <div class="booking-slot-panel ${di === state.openDetailDay ? 'active' : ''}" id="bsp-${di}">
      ${renderSlotPanel(s, di, d.key)}
    </div>`).join('');

  body.innerHTML = `
    <div class="s-detail-top">
      <div class="s-detail-flag">${s.flag}</div>
      <div class="s-detail-info">
        <div class="s-detail-company">${s.company}</div>
        <div class="s-detail-country">${s.country}</div>
        <span class="s-detail-booth-badge">📍 ${s.booth}</span>
      </div>
    </div>
    <div class="s-detail-desc">${s.desc}</div>

    <div class="detail-section-title">주요 제품</div>
    <div class="product-list">
      ${s.products.map(p => `<div class="product-tag">📦 ${p}</div>`).join('')}
    </div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:20px;">
      📧 ${s.contact}
    </div>

    <div class="detail-section-title">상담 일정 신청</div>
    <div class="slot-legend">
      <div class="sl"><div class="sl-dot avail"></div>신청 가능</div>
      <div class="sl"><div class="sl-dot mine"></div>내 예약</div>
      <div class="sl"><div class="sl-dot others"></div>마감</div>
      <div class="sl"><div class="sl-dot conflict"></div>다른 상담 있음</div>
    </div>
    <div class="booking-days">${dayTabs}</div>
    <div id="slot-panels">${panels}</div>
    <p style="font-size:12px;color:var(--t3);margin-top:8px;">
      ※ 상담 시간: 25분 + 5분 휴식 / 점심시간 12:30~13:30 제외
    </p>`;
}

function renderSlotPanel(s, di, dayKey) {
  let html = '';
  const morning   = SLOTS.filter(sl => sl.label === '오전');
  const afternoon = SLOTS.filter(sl => sl.label === '오후');

  function slotHtml(sl) {
    const k      = dayKey + '_' + sl.id;
    const isMine = state.bookings.some(b => b.supplierId === s.id && b.dayKey === dayKey && b.slotId === sl.id);
    const isFull = OCCUPIED[s.id][k] === 'others' && !isMine;
    const hasConflict = !isMine && !isFull && state.bookings.some(
      b => b.dayKey === dayKey && b.slotId === sl.id && b.supplierId !== s.id
    );
    let cls = 'b-slot';
    let status = '신청 가능';
    if (isMine)       { cls += ' mine-slot'; status = '✓ 예약됨'; }
    else if (isFull)  { cls += ' full'; status = '마감'; }
    else if (hasConflict) { cls += ' conflict-slot'; status = '시간 중복'; }
    const onclick = (!isFull && !hasConflict)
      ? `onclick="toggleBooking(${s.id},'${dayKey}','${sl.id}')"` : '';
    return `<div class="${cls}" ${onclick}>
      <div class="b-slot-time">${sl.time}</div>
      <div class="b-slot-status">${status}</div>
    </div>`;
  }

  html += `<div class="slots-grid">${morning.map(slotHtml).join('')}</div>`;
  html += `<div class="lunch-divider">🍱 점심시간 12:30 ~ 13:30</div>`;
  html += `<div class="slots-grid">${afternoon.map(slotHtml).join('')}</div>`;
  return html;
}

function switchDetailDay(di) {
  state.openDetailDay = di;
  const s = SUPPLIERS.find(x => x.id === state.openDetailId);
  document.querySelectorAll('.booking-day-tab').forEach((t, i) => {
    t.classList.toggle('active', i === di);
  });
  DAYS.forEach((d, i) => {
    const panel = document.getElementById('bsp-' + i);
    if (panel) {
      panel.classList.toggle('active', i === di);
      if (i === di) panel.innerHTML = renderSlotPanel(s, di, d.key);
    }
  });
}
window.switchDetailDay = switchDetailDay;

/* ──────────────────────────────────────
   BOOKING
────────────────────────────────────── */
function toggleBooking(supplierId, dayKey, slotId) {
  if (!state.buyer) {
    toast('먼저 바이어 등록을 해주세요.', 'error');
    closeModal('supplier-modal');
    setTimeout(() => openRegModal(), 300);
    return;
  }
  const existing = state.bookings.findIndex(
    b => b.supplierId === supplierId && b.dayKey === dayKey && b.slotId === slotId
  );
  if (existing !== -1) {
    state.bookings.splice(existing, 1);
    toast('상담 예약이 취소되었습니다.', 'info');
  } else {
    state.bookings.push({ supplierId, dayKey, slotId });
    const s    = SUPPLIERS.find(x => x.id === supplierId);
    const day  = DAYS.find(d => d.key === dayKey);
    const slot = SLOTS.find(sl => sl.id === slotId);
    toast(`${s.company} ${day.label} ${slot.time} 예약 완료!`, 'success');
  }
  updateBadge();
  /* 현재 패널 새로고침 */
  const di = state.openDetailDay;
  const d  = DAYS[di];
  const panel = document.getElementById('bsp-' + di);
  const s = SUPPLIERS.find(x => x.id === supplierId);
  if (panel) panel.innerHTML = renderSlotPanel(s, di, d.key);
}
window.toggleBooking = toggleBooking;

function updateBadge() {
  const cnt  = state.bookings.length;
  const el   = document.getElementById('bnav-cnt');
  el.textContent = cnt;
  el.classList.toggle('show', cnt > 0);
}

/* ──────────────────────────────────────
   TIMETABLE
────────────────────────────────────── */
function renderTimetable() {
  const el = document.getElementById('timetable-content');
  if (!state.buyer) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📅</div>
      <div class="empty-title">바이어 등록 후 이용 가능합니다</div>
      <div class="empty-sub">등록하시면 예약한 상담 일정을<br>타임테이블로 확인하실 수 있습니다.</div>
      <button class="btn-primary" style="width:200px;margin-top:8px" onclick="openRegModal()">바이어 등록하기</button>
    </div>`;
    return;
  }
  if (!state.bookings.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">예약된 상담이 없습니다</div>
      <div class="empty-sub">공급업체 목록에서 원하는 업체를<br>선택해 상담을 신청하세요.</div>
      <button class="btn-primary" style="width:200px;margin-top:8px" onclick="navigate('suppliers')">공급업체 둘러보기</button>
    </div>`;
    return;
  }

  const byCnt = state.bookings.length;
  let html = `
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <div class="bs-card" style="flex:1;min-width:100px">
        <div class="bs-num">${byCnt}</div>
        <div class="bs-lbl">총 예약</div>
      </div>
      <div class="bs-card" style="flex:1;min-width:100px">
        <div class="bs-num">${Math.round(byCnt * 25 / 60 * 10)/10}h</div>
        <div class="bs-lbl">총 상담 시간</div>
      </div>
      <div class="bs-card" style="flex:1;min-width:100px">
        <div class="bs-num">${new Set(state.bookings.map(b=>b.supplierId)).size}</div>
        <div class="bs-lbl">업체 수</div>
      </div>
    </div>
    <div class="tt-table-wrap">
    <table class="tt-table">
      <thead><tr>
        <th>시간</th>
        ${DAYS.map(d => `<th>${d.label}</th>`).join('')}
      </tr></thead>
      <tbody>`;

  SLOTS.forEach((slot, si) => {
    if (si === 4) {
      html += `<tr class="tt-lunch"><td colspan="4">🍱 점심시간 &nbsp; 12:30 ~ 13:30</td></tr>`;
    }
    html += `<tr><td class="tt-time-cell">${slot.time}</td>`;
    DAYS.forEach(d => {
      const booking = state.bookings.find(b => b.dayKey === d.key && b.slotId === slot.id);
      if (booking) {
        const s = SUPPLIERS.find(x => x.id === booking.supplierId);
        html += `<td class="tt-slot-cell">
          <div class="tt-booked" onclick="cancelFromTT(${s.id},'${d.key}','${slot.id}')">
            <div class="tt-booked-company">${s.flag} ${s.company}</div>
            <div class="tt-booked-cat">${s.category} · 취소▸</div>
          </div>
        </td>`;
      } else {
        html += `<td class="tt-slot-cell"><span class="tt-empty">-</span></td>`;
      }
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

function cancelFromTT(supplierId, dayKey, slotId) {
  const idx = state.bookings.findIndex(
    b => b.supplierId === supplierId && b.dayKey === dayKey && b.slotId === slotId
  );
  if (idx !== -1) {
    state.bookings.splice(idx, 1);
    const s    = SUPPLIERS.find(x => x.id === supplierId);
    const day  = DAYS.find(d => d.key === dayKey);
    const slot = SLOTS.find(sl => sl.id === slotId);
    toast(`${s.company} ${day.label} ${slot.time} 예약이 취소되었습니다.`, 'info');
    updateBadge();
    renderTimetable();
  }
}
window.cancelFromTT = cancelFromTT;

/* ──────────────────────────────────────
   PROFILE
────────────────────────────────────── */
function renderProfile() {
  const el = document.getElementById('profile-content');
  if (!state.buyer) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">👤</div>
      <div class="empty-title">바이어 등록이 필요합니다</div>
      <div class="empty-sub">등록하시면 프로필과 예약 내역을<br>확인하실 수 있습니다.</div>
      <button class="btn-primary" style="width:200px;margin-top:8px" onclick="openRegModal()">바이어 등록하기</button>
    </div>`;
    return;
  }
  const b = state.buyer;
  const initials = b.name.substring(0, 1);
  const bklist   = state.bookings.map(bk => {
    const s    = SUPPLIERS.find(x => x.id === bk.supplierId);
    const day  = DAYS.find(d => d.key === bk.dayKey);
    const slot = SLOTS.find(sl => sl.id === bk.slotId);
    return `<div class="bk-item">
      <div class="bk-left">
        <span class="bk-flag">${s.flag}</span>
        <div>
          <div class="bk-company">${s.company}</div>
          <div class="bk-time">${day.label} · ${slot.time} · ${s.booth}</div>
        </div>
      </div>
      <button class="bk-cancel" onclick="cancelBooking(${s.id},'${bk.dayKey}','${bk.slotId}')">취소</button>
    </div>`;
  }).join('') || `<div style="text-align:center;padding:24px;color:var(--t3);font-size:14px;">예약된 상담이 없습니다.</div>`;

  el.innerHTML = `
    <div class="profile-card">
      <div class="profile-top">
        <div class="profile-avatar">${initials}</div>
        <div>
          <div class="profile-name">${b.name}</div>
          <div class="profile-company">${b.company}</div>
        </div>
      </div>
      <div class="profile-meta">
        ${b.title ? `<div class="pm-row"><span class="pm-label">직책</span><span class="pm-value">${b.title}</span></div>` : ''}
        <div class="pm-row"><span class="pm-label">이메일</span><span class="pm-value">${b.email}</span></div>
        <div class="pm-row"><span class="pm-label">연락처</span><span class="pm-value">${b.phone}</span></div>
        ${b.categories && b.categories.length ? `<div class="pm-row"><span class="pm-label">관심분야</span><span class="pm-value">${b.categories.join(', ')}</span></div>` : ''}
      </div>
    </div>

    <div class="booking-summary">
      <div class="bs-card"><div class="bs-num">${state.bookings.length}</div><div class="bs-lbl">총 예약</div></div>
      <div class="bs-card"><div class="bs-num">${new Set(state.bookings.map(b=>b.dayKey)).size}/3</div><div class="bs-lbl">참여 일수</div></div>
      <div class="bs-card"><div class="bs-num">${new Set(state.bookings.map(b=>b.supplierId)).size}</div><div class="bs-lbl">예약 업체</div></div>
    </div>

    <div class="section-header">
      <div class="section-title">예약 내역</div>
    </div>
    <div class="booking-list">${bklist}</div>`;
}

function cancelBooking(supplierId, dayKey, slotId) {
  const idx = state.bookings.findIndex(
    b => b.supplierId === supplierId && b.dayKey === dayKey && b.slotId === slotId
  );
  if (idx !== -1) {
    state.bookings.splice(idx, 1);
    toast('예약이 취소되었습니다.', 'info');
    updateBadge();
    renderProfile();
  }
}
window.cancelBooking = cancelBooking;

/* ──────────────────────────────────────
   BUYER REGISTRATION
────────────────────────────────────── */
function openRegModal() {
  const chkWrap = document.getElementById('cat-checkboxes');
  chkWrap.innerHTML = CATEGORIES.map(c => `
    <label class="cat-chk" onclick="toggleCat(this)">
      <input type="checkbox" value="${c}">
      ${CAT_ICON[c]||''} ${c}
    </label>`).join('');
  openModal('reg-modal');
}
window.openRegModal = openRegModal;

function toggleCat(el) {
  el.classList.toggle('checked');
}
window.toggleCat = toggleCat;

function submitReg() {
  const name    = document.getElementById('f-name').value.trim();
  const company = document.getElementById('f-company').value.trim();
  const email   = document.getElementById('f-email').value.trim();
  const phone   = document.getElementById('f-phone').value.trim();
  if (!name || !company || !email || !phone) {
    toast('필수 항목을 모두 입력해주세요.', 'error'); return;
  }
  const cats = Array.from(document.querySelectorAll('.cat-chk.checked input'))
    .map(i => i.value);
  state.buyer = {
    name, company, email, phone,
    title: document.getElementById('f-title').value.trim(),
    categories: cats,
  };
  closeModal('reg-modal');
  toast(`환영합니다, ${name}님! 바이어 등록이 완료되었습니다.`, 'success');
  renderHeaderProfile();
  if (state.view === 'profile')   renderProfile();
  if (state.view === 'timetable') renderTimetable();
}
window.submitReg = submitReg;

function renderHeaderProfile() {
  if (!state.buyer) return;
  const b = state.buyer;
  document.getElementById('header-right').innerHTML = `
    <div class="profile-chip" onclick="navigate('profile')">
      <div class="avatar">${b.name.substring(0,1)}</div>
      ${b.company}
    </div>`;
}

/* ──────────────────────────────────────
   INIT
────────────────────────────────────── */
renderHomeSlots();
renderSuppliers();
</script>
